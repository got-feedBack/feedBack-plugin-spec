name: pages

# Builds the documentation site with MkDocs Material (light/dark themed) and deploys
# it to GitHub Pages. tools/gen_docs.py assembles the site from the canonical sources
# (spec/, CHANGELOG.md, schemas/) and copies the schema in verbatim so its hosted
# `$id` URL keeps resolving.
#
# One-time setup by a maintainer: Settings → Pages → Build and deployment →
# Source: "GitHub Actions". Until that is set, the deploy step will fail. (Pages for a
# private repository requires a plan that permits it.)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs Material
        run: python -m pip install --upgrade -r requirements-docs.txt

      - name: Assemble docs tree (spec + best-practices + changelog + schema)
        run: python tools/gen_docs.py

      - name: Build site
        run: |
          SPEC_VERSION="$(python tools/changelog_extract.py --latest-version)" mkdocs build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
