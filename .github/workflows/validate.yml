name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install --upgrade -r requirements-dev.txt

      - name: Check the manifest schema is a valid JSON Schema (Draft 2020-12)
        run: |
          python - <<'PY'
          import glob, json, sys
          from jsonschema import Draft202012Validator
          bad = False
          for f in sorted(glob.glob("schemas/*.json")):
              try:
                  with open(f, encoding="utf-8") as fh:
                      Draft202012Validator.check_schema(json.load(fh))
                  print("ok  ", f)
              except Exception as exc:
                  bad = True
                  print("FAIL", f, exc)
          sys.exit(1 if bad else 0)
          PY

      - name: Validate example plugins
        run: python tools/validate.py examples/minimal-plugin examples/full-plugin

      - name: Run unit tests
        run: python -m pytest -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install --upgrade ruff
      - name: Lint reference tooling and tests
        run: python -m ruff check tools/ tests/

      - name: Check spec / README / CHANGELOG versions agree
        run: python tools/check_versions.py

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install MkDocs Material
        run: python -m pip install --upgrade -r requirements-docs.txt
      - name: Assemble docs tree
        run: python tools/gen_docs.py
      # --strict fails the build on MkDocs warnings (bad nav, config, unreadable pages).
      # Link/anchor checking is intentionally relaxed in mkdocs.yml (not_found: ignore) for
      # the generated schema/blob links; the dedicated `links` job gates Markdown links.
      - name: Build site (strict)
        run: |
          SPEC_VERSION="$(python tools/changelog_extract.py --latest-version)" mkdocs build --strict

  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          config-file: ".github/markdown-link-check.json"
